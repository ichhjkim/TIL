<html xmlns:th="http://www.thymeleaf.org">

<head>
	<title>Home</title>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8"></meta>
</head>

<script src="https://code.jquery.com/jquery-2.2.1.min.js"></script>
<script type="text/javascript">

	$(document).ready(function() {
		$("#listBtn").on("click", function(){
			$get("/boards", function(data) {
				console.log(data);'
				alert(JSON.stringify(data));
			});
		});
		
	$("#readBtn").on("click", function() {
		var boardNo = $("#boardNo");
		var boardNoVal = boardNo.val();
		
		console.log(boardNoVal);
		
		$get("/boards/"+boardNoVal, function(data) {
			console.log(data);
			
			alert(JSON.stringify(data));
			
		});
		
	});
	
	$("#registerBtn").on("click", function() {
		var title = $("#title");
		var content = $("#content");
		var writer = $("#writer");
		
		var titleVal = title.val();
		var contentVal = content.val();
		var writerVal = writer.val();
		
		var boardObject = {
				title : titleVal,
				content : contentVal,
				writer : writerVal
				
		};
		
		$.ajax({
			type: "POST",
			url: "/boards",
			data: JSON.stringify(boardObject),
			content Type: "application/json; charset=UTF-8",
			success: function(result) {
				console.log("result"+result);
				alert(result);
			},
			error: function(request, status, error) {
				alert("code"+ request.status+"\n"
						+"message"+request.responseText+"\n"+"error:"+ error);
				
				
			}
		});
	});
	$("#deleteBtn").on("click", function() {
		var boardNo = $("#boardNo");
		var boardNoVal = boardNo.val();
		
		console.log(boardNoVal);
		
		$.ajax({
			type: "DELETE",
			url: "/boards/"+boardNoVal,
			success: function(result) {
				console.log("result"+result);
				alert(result);
			}
		});
		
	}); 
	
	$("#modifyBtn").on("click", function() {
		var boardNo = $("#boardNo");
		var title = $("#title");
		var content = $("#content");
		var writer = $("#writer");
		
		var boardNoVal = boardNo.val();
		var titleval = title.val();
		var writerVal = writer.val();
		
		var boardObject = {
				boardNo : boardNoVal,
				title : titleVal,
				content: contentVal,
				writer: writerVal
		};
		
		$.ajax({
			type: "PUT",
			url: "/boards/"+boardNoVal,
			data: JSON.stringify(boardObject),
			contentType: "application/json; charset=UTF-8",
			success: function(result) {
				console.log("result"+result);
				alert(result);
				
			}
		});
		
	});
	
	});
	

</script>

<body>
	<h1>제발 되어라...</h1>
	<form>
	boardNo : <input type="text" name="boardNo" value="" id="boardNo"></input>
	title : <input type="text" name="content" value="" id="title"></input>
	content: <input type="text" name="content" value="" id="content"></input>
	writer: <input type="text" name="writer" value="" id="writer"></input>
	</form>
	
	<div>
		<button id="listBtn">리스트</button>
		<button id="readBtn"> 읽기</button>
		<button id="registerBtn">register</button>
		<button id="deleteBtn">delete</button>
		<button id="modifyBtn">modify</button>
	</div>
</body>
</html>
